"""Channel entity"""
type Channel {
  """
  The ID of the channel
  Source: mapper from channel collection - channel._id
  Defined in: both proposals
  """
  id: ChannelId!

  """
  The allowed actions for the current user
  Source: field resolver
  Defined in: new proposal
  """
  allowedActions: [ChannelAction!]!

  """
  Scopes requested for a given channel - empty array if we don't have them tracked
  Source: mapper from channel collection - channel.credentials.scopes
  Defined in: current implementation
  """
  scopes: [String]!

  """
  The avatar URL of the channel
  Source: mapper from channel collection - channel.avatar
  Defined in: both proposals
  """
  avatar: String!

  """
  The creation date of the channel
  Source: mapper from channel collection - channel.createdAt
  Defined in: both proposals
  """
  createdAt: DateTime!

  """
  Formatted name of the channel service and type: e.g. 'Twitter Profile' or 'Facebook Page'
  Source: mapper from channel collection - channel.service and channel.type
  Defined in: current implementation
  """
  descriptor: String!

  """
  The display name of the channel - nullable (reason?)
  Source: mapper from channel collection - channel.displayName
  Defined in: current implementation
  """
  displayName: String

  """
  Indicates if the channel is properly connected to Buffer
  Source: mapper from channel collection - channel.credentials.invalid
  Defined in: both proposals
  """
  isDisconnected: Boolean!

  """
  Indicates if the channel is locked - Locked channels can't be used for posting.
  A channel can be locked when the organization downgrades and reduces the channel quantity of their plan.
  Source: mapper from channel collection - channel.isLocked
  Defined in: both proposals
  """
  isLocked: Boolean!

  """
  Indicates if the channel was recently created (in less than 10 seconds). This is used to determine the redirect modal after channel authorization
  Source: mapper from channel collection - channel.createdAt comparison with current time
  Defined in: current implementation
  """
  isNew: Boolean!

  """
  Provides the posting slots for each day of the week
  Source: field resolver based on profiles collection - getPostingSchedule
  """
  postingSchedule: [ScheduleV2!]!

  """
  Indicates is the queue is paused for the channel. A paused queue means schedules posts won't be published.
  Source: Field resolver - From profiles collection - profile.paused
  Defined in: new proposal
  """
  isQueuePaused: Boolean!

  """
  Indicates if trending topic suggestions should be shown in the composer.
  When false, users can still access trends via the trending icon button.
  Defaults to true for backward compatibility.
  Source: Field resolver - From profiles collection - profile.show_trending_topic_suggestions
  """
  showTrendingTopicSuggestions: Boolean!

  """
  Metadata or settings depending on the service type - such as the server URL for Mastodon or Location data for Facebook/GPB
  Source: Field resolver - From channel collection: channel.locationData + channel.serverURL | profile collection: profile.default_to_reminder
  Defined in: new proposal
  """
  metadata: ChannelMetadata

  """
  The name of the channel - the handle name, username, etc.
  Source: mapper from channel collection - channel.name
  Defined in: both proposals
  """
  name: String!

  """
  The organization ID of the channel
  Source: mapper from channel collection - channel.organizationId
  Defined in: both proposals
  """
  organizationId: OrganizationId!

  """Products that support a given channel"""
  products: [Product!]

  """
  Represents the social network
  Source: mapper from channel collection - channel.serviceType
  Defined in: both proposals
  """
  service: Service!

  """
  Represents the external ID of the channel on social network API
  Source: mapper from channel collection - channel.serviceId
  Defined in: both proposals
  """
  serviceId: String!

  """
  The timezone of the channel - Default if not set is Europe/London
  Source: field resolver based on profiles collection - timezone
  Defined in: both proposals
  """
  timezone: String!

  """
  The type of the channel - Page, Profile, Business, Group, Account, etc.
  Source: mapper from channel collection - channel.type
  Defined in: both proposals
  """
  type: ChannelType!

  """
  The last time the channel was updated
  Source: mapper from channel collection - channel.updatedAt
  Defined in: both proposals
  """
  updatedAt: DateTime!

  """
  Whether at least one member of the orginization who have access to this channel
  also has a user device registered for push notifications
  """
  hasActiveMemberDevice: Boolean!

  """The posting goal for the channel"""
  postingGoal: PostingGoal

  """
  The channel's URL on the social network (e.g. instagram.com/username or facebook.com/page)
  Source: field resolver
  Returns null if the channel is not supported
  """
  externalLink: String

  """Link Shortening settings for the channel"""
  linkShortening: ChannelLinkShortening!

  """Weekly posting limit for the channel"""
  weeklyPostingLimit: WeeklyPostingLimit @deprecated(reason: "This field is not used anymore")
}

