type IdeaResponse {
  """The affected idea"""
  idea: Idea

  """
  If true, the client should refresh the ideas list because other ideas might have been moved
  """
  refreshIdeas: Boolean!
}

"""createIdea response (including errors)"""
union CreateIdeaPayload = Idea | IdeaResponse | InvalidInputError | UnauthorizedError | UnexpectedError | LimitReachedError